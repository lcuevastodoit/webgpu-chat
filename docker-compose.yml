services:
  webml:
    build: .
    container_name: webml-webpage
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - NODE_ENV=production
    volumes:
      - model-data:/app/model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  model-data:
