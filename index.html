<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gemma 4 Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #171717;
      --bg-sidebar: #0a0a0a;
      --text-primary: #e4e4e4;
      --text-secondary: #a0a0a0;
      --accent: #64ffa0;
      --accent-hover: #4ade80;
      --border: #2a2a2a;
      --user-msg-bg: transparent;
      --assistant-msg-bg: transparent;
      --code-bg: #1a1a1a;
      --success: #64ffa0;
      --warning: #ffcd6b;
      --error: #ff7a6b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100%;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .new-chat-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .new-chat-btn:hover {
      background: rgba(255,255,255,0.05);
    }

    .new-chat-btn svg {
      width: 16px;
      height: 16px;
    }

    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .chat-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .chat-item:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
    }

    .chat-item.active {
      background: rgba(100, 255, 160, 0.1);
      color: var(--accent);
    }

    .chat-item svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .model-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
    }

    .status-dot.ready {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .status-dot.loading {
      background: var(--warning);
      box-shadow: 0 0 8px var(--warning);
      animation: pulse 1.5s infinite;
    }

    .status-dot.error {
      background: var(--error);
      box-shadow: 0 0 8px var(--error);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .mobile-header {
      display: none;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      justify-content: space-between;
    }

    .menu-btn {
      background: none;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      padding: 8px;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 160px;
    }

    .message {
      padding: 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .message-content {
      max-width: 48rem;
      margin: 0 auto;
      display: flex;
      gap: 16px;
    }

    .message.user .message-content {
      justify-content: flex-end;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    .avatar.user {
      background: #3b3b3b;
      color: #fff;
      order: 2;
    }

    .avatar.assistant {
      background: var(--accent);
      color: #0d0d0d;
    }

    .message-body {
      flex: 1;
      line-height: 1.6;
      font-size: 15px;
      color: var(--text-primary);
    }

    .message.user .message-body {
      text-align: right;
    }

    .message-body h1, .message-body h2, .message-body h3 {
      margin: 16px 0 12px;
      font-weight: 600;
    }

    .message-body h1 { font-size: 1.5rem; }
    .message-body h2 { font-size: 1.25rem; }
    .message-body h3 { font-size: 1.1rem; }

    .message-body p { margin: 8px 0; }
    .message-body ul, .message-body ol {
      margin: 8px 0 8px 20px;
    }
    .message-body li { margin: 4px 0; }

    .message-body code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
    }

    .message-body pre {
      background: var(--code-bg);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 12px 0;
      border: 1px solid var(--border);
      position: relative;
    }

    .message-body pre code {
      background: none;
      padding: 0;
    }

    .message-body blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      margin: 12px 0;
      color: var(--text-secondary);
    }

    .message-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
    }

    .message-body th, .message-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }

    .message-body th {
      background: var(--bg-secondary);
    }

    .message-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .message:hover .message-actions {
      opacity: 1;
    }

    .action-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px 8px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
    }

    .action-btn svg {
      width: 14px;
      height: 14px;
    }

    .input-container {
      position: fixed;
      bottom: 0;
      left: 260px;
      right: 0;
      background: linear-gradient(to top, var(--bg-primary) 0%, var(--bg-primary) 85%, transparent 100%);
      padding: 24px 16px 32px;
    }

    .input-wrapper {
      max-width: 48rem;
      margin: 0 auto;
      position: relative;
    }

    .input-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 56px 14px 16px;
      display: flex;
      align-items: flex-end;
    }

    .input-box:focus-within {
      border-color: rgba(100, 255, 160, 0.3);
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 24px;
      max-height: 200px;
      font-family: inherit;
    }

    textarea::placeholder {
      color: var(--text-secondary);
    }

    textarea:disabled {
      opacity: 0.5;
    }

    .send-btn {
      position: absolute;
      right: 8px;
      bottom: 8px;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      color: #0d0d0d;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    .input-footer {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 0;
      justify-content: center;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px;
      text-align: center;
    }

    .empty-state h2 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--accent), #4ade80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .empty-state p {
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .load-model-btn {
      padding: 12px 24px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0d0d0d;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .load-model-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .load-model-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .progress-bar {
      width: 200px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 16px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .progress-text {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .system-message {
      background: rgba(255, 205, 107, 0.1);
      border: 1px solid rgba(255, 205, 107, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      margin: 16px auto;
      max-width: 48rem;
      font-size: 13px;
      color: var(--warning);
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .mobile-header {
        display: flex;
      }

      .input-container {
        left: 0;
      }

      .message {
        padding: 16px 12px;
      }
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }

    .overlay.show {
      display: block;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <script>
    // Detectar si se abre desde file://
    if (window.location.protocol === 'file:') {
      document.body.innerHTML = `
        <div style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background: #0d0d0d;
          color: #e4e4e4;
          font-family: 'Inter', sans-serif;
          text-align: center;
          padding: 40px;
        ">
          <h1 style="color: #ffcd6b; margin-bottom: 20px;">⚠️ Servidor no detectado</h1>
          <p style="color: #a0a0a0; margin-bottom: 30px; max-width: 500px; line-height: 1.6;">
            Has abierto este archivo directamente desde el sistema de archivos.
            <br><br>
            Para que funcione correctamente, debes usar el servidor HTTP:
          </p>
          <div style="background: #1a1a1a; padding: 20px 30px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px;">
            <code style="color: #64ffa0; font-size: 16px;">http://localhost:3000</code>
          </div>
          <p style="color: #666; font-size: 14px;">
            Asegúrate de que el servidor esté corriendo con: <br>
            <code style="background: #1a1a1a; padding: 4px 8px; border-radius: 4px;">npm start</code>
          </p>
        </div>
      `;
      throw new Error('File protocol not supported');
    }
  </script>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="new-chat-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          New chat
        </button>
      </div>
      <div class="chat-history" id="chat-history"></div>
      <div class="sidebar-footer">
        <div class="model-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Model not loaded</span>
        </div>
        <div>Gemma 4 E2B (QAT Mobile)</div>
      </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="main">
      <div class="mobile-header">
        <button class="menu-btn" id="menu-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <span>Gemma 4 Chat</span>
        <button class="new-chat-btn" style="width: auto; padding: 8px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>

      <div class="chat-container" id="chat-container">
        <div class="empty-state" id="empty-state">
          <h2>Gemma 4 E2B</h2>
          <p id="empty-subtitle">Running locally in your browser via WebGPU</p>

          <div id="checking-state" class="hidden">
            <div class="typing-indicator" style="margin: 20px 0;">
              <span></span><span></span><span></span>
            </div>
            <p style="color: var(--text-secondary); font-size: 14px;">Checking local model...</p>
          </div>

          <div id="loading-local-state" class="hidden">
            <div class="progress-bar" style="display: block; margin: 20px auto;">
              <div class="progress-fill" id="local-progress-fill" style="width: 0%;"></div>
            </div>
            <p id="local-progress-text" style="color: var(--accent); font-size: 14px;">Loading local model...</p>
          </div>

          <div id="cdn-load-state" class="hidden">
            <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 16px;">
              Local model not found. You can:
            </p>
            <button class="load-model-btn" id="download-model-btn" style="margin-bottom: 8px;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              Download Model (~2.3GB) - Recommended
            </button>
            <button class="load-model-btn" id="load-cdn-btn" style="background: transparent; border: 1px solid var(--border); color: var(--text-secondary);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
              </svg>
              Load from CDN (slower)
            </button>
          </div>

          <div class="progress-bar" id="progress-bar" style="display: none;">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="progress-text" id="progress-text"></div>
        </div>
      </div>

      <div class="input-container" id="input-container" style="display: none;">
        <div class="input-wrapper">
          <div class="input-box">
            <textarea id="input" rows="1" placeholder="Message Gemma..." disabled></textarea>
            <button class="send-btn" id="send-btn" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
          <div class="input-footer">
            Gemma 4 can make mistakes. Consider checking important information.
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module">
    import { Gemma4Mobile } from "https://webml-community-gemma-4-webgpu-kernels.static.hf.space/gemma-4-e2b.js";

    const chatContainer = document.getElementById('chat-container');
    const emptyState = document.getElementById('empty-state');
    const inputContainer = document.getElementById('input-container');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const newChatBtn = document.getElementById('new-chat-btn');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const chatHistory = document.getElementById('chat-history');
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menu-btn');
    const overlay = document.getElementById('overlay');
    const emptySubtitle = document.getElementById('empty-subtitle');

    const checkingState = document.getElementById('checking-state');
    const loadingLocalState = document.getElementById('loading-local-state');
    const cdnLoadState = document.getElementById('cdn-load-state');
    const downloadModelBtn = document.getElementById('download-model-btn');
    const loadCdnBtn = document.getElementById('load-cdn-btn');
    const localProgressFill = document.getElementById('local-progress-fill');
    const localProgressText = document.getElementById('local-progress-text');

    let model = null;
    let isLoading = false;
    let isGenerating = false;
    let currentChatId = null;
    let messages = [];
    let chats = JSON.parse(localStorage.getItem('gemma-chats') || '[]');

    renderChatHistory();
    loadCurrentChat();

    if (!navigator.gpu) {
      statusDot.className = 'status-dot error';
      statusText.textContent = 'WebGPU not supported';
      showSystemMessage('Your browser does not support WebGPU. Please use Chrome 113+ or Edge 113+.');
    } else {
      checkLocalModel();
    }

    async function checkLocalModel() {
      emptySubtitle.classList.add('hidden');
      checkingState.classList.remove('hidden');

      try {
        const response = await fetch('/api/model-status');
        const status = await response.json();

        checkingState.classList.add('hidden');

        if (status.exists) {
          loadFromLocal();
        } else {
          emptySubtitle.classList.remove('hidden');
          cdnLoadState.classList.remove('hidden');
        }
      } catch (e) {
        checkingState.classList.add('hidden');
        emptySubtitle.classList.remove('hidden');
        cdnLoadState.classList.remove('hidden');
        console.log('Server not available, using CDN fallback');
      }
    }

    async function loadFromLocal() {
      loadingLocalState.classList.remove('hidden');
      isLoading = true;
      statusDot.className = 'status-dot loading';
      statusText.textContent = 'Loading from local...';

      try {
        model = await Gemma4Mobile.load(null, {
          onProgress: (event) => {
            if (event.status === 'weights' && event.fraction) {
              localProgressFill.style.width = (event.fraction * 100) + '%';
              const loaded = event.loaded || 0;
              const total = event.total || 0;
              localProgressText.textContent = `Loading: ${formatBytes(loaded)} / ${formatBytes(total)}`;
            }
          }
        });

        await model.warmup();

        statusDot.className = 'status-dot ready';
        statusText.textContent = 'Ready';

        emptyState.style.display = 'none';
        inputContainer.style.display = 'block';
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();

        if (!currentChatId) {
          startNewChat();
        }
      } catch (err) {
        console.error(err);
        statusDot.className = 'status-dot error';
        statusText.textContent = 'Error loading model';
        showSystemMessage('Error loading local model: ' + err.message);
        loadingLocalState.classList.add('hidden');
        cdnLoadState.classList.remove('hidden');
      }

      isLoading = false;
    }

    async function downloadModel() {
      downloadModelBtn.disabled = true;
      downloadModelBtn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite;">
          <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="20"></circle>
        </svg>
        Downloading... Check terminal
      `;

      try {
        const response = await fetch('/api/download-model', { method: 'POST' });
        const result = await response.json();

        showSystemMessage(result.message + ' Wait for download to complete, then refresh.');

        let dots = 0;
        const interval = setInterval(() => {
          dots = (dots + 1) % 4;
          downloadModelBtn.innerHTML = `
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite;">
              <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="20"></circle>
            </svg>
            Downloading${'.'.repeat(dots)}
          `;
        }, 500);

      } catch (err) {
        showSystemMessage('Error starting download: ' + err.message);
        downloadModelBtn.disabled = false;
        downloadModelBtn.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Download Model (~2.3GB) - Recommended
        `;
      }
    }

    async function loadFromCDN() {
      cdnLoadState.classList.add('hidden');
      emptySubtitle.classList.add('hidden');
      progressBar.style.display = 'block';
      isLoading = true;
      statusDot.className = 'status-dot loading';
      statusText.textContent = 'Loading from CDN...';

      try {
        model = await Gemma4Mobile.load(null, { onProgress });
        await model.warmup();

        statusDot.className = 'status-dot ready';
        statusText.textContent = 'Ready';

        emptyState.style.display = 'none';
        inputContainer.style.display = 'block';
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();

        if (!currentChatId) {
          startNewChat();
        }
      } catch (err) {
        console.error(err);
        statusDot.className = 'status-dot error';
        statusText.textContent = 'Error loading model';
        showSystemMessage('Error: ' + err.message);
        cdnLoadState.classList.remove('hidden');
      }

      isLoading = false;
    }

    sendBtn.addEventListener('click', sendMessage);
    newChatBtn.addEventListener('click', startNewChat);
    menuBtn.addEventListener('click', toggleSidebar);
    overlay.addEventListener('click', toggleSidebar);
    downloadModelBtn.addEventListener('click', downloadModel);
    loadCdnBtn.addEventListener('click', loadFromCDN);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    });

    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function onProgress(event) {
      if (event.status === 'init') {
        statusText.textContent = 'Requesting WebGPU device...';
        progressFill.style.width = '2%';
      } else if (event.status === 'tokenizer') {
        statusText.textContent = 'Loading tokenizer...';
        progressFill.style.width = '4%';
      } else if (event.status === 'weights') {
        const kind = event.kind || (event.total > 1_000_000 ? 'bytes' : 'tensors');
        const fraction = event.fraction || 0;

        if (kind === 'bytes') {
          const verb = event.fromCache ? 'Loading cached' : 'Downloading';
          const loaded = event.loaded || 0;
          const total = event.total || 0;
          progressText.textContent = `${verb}: ${formatBytes(loaded)} / ${formatBytes(total)} (${Math.round(fraction * 100)}%)`;
          progressFill.style.width = (4 + fraction * 96) + '%';
        } else {
          progressText.textContent = 'Preparing GPU weights...';
        }
      }
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || !model || isGenerating) return;

      isGenerating = true;
      input.value = '';
      input.style.height = 'auto';
      input.disabled = true;
      sendBtn.disabled = true;

      addMessage(text, 'user');
      messages.push({ role: 'user', content: text });

      const typingId = addTypingIndicator();
      let reply = '';

      try {
        const stream = model.generate(messages, { maxNewTokens: 4096 });

        for await (const { text: full } of stream) {
          reply = full;
          updateTypingIndicator(typingId, reply);
        }

        removeTypingIndicator(typingId);
        if (reply) {
          addMessage(reply, 'assistant');
          messages.push({ role: 'assistant', content: reply });
        }

        saveCurrentChat();
      } catch (err) {
        console.error(err);
        removeTypingIndicator(typingId);
        addMessage('Error: ' + err.message, 'error');
      }

      isGenerating = false;
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }

    function addMessage(content, role) {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message ' + role;

      const avatar = role === 'user' ? 'You' : 'AI';
      const avatarClass = role === 'user' ? 'user' : 'assistant';
      const html = role === 'assistant' ? marked.parse(content) : escapeHtml(content);

      messageDiv.innerHTML = `
        <div class="message-content">
          <div class="avatar ${avatarClass}">${avatar}</div>
          <div class="message-body">
            ${html}
            ${role === 'assistant' ? `
              <div class="message-actions">
                <button class="action-btn" onclick="copyMessage(this)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                  Copy
                </button>
              </div>
            ` : ''}
          </div>
        </div>
      `;

      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addTypingIndicator() {
      const id = 'typing-' + Date.now();
      const typingDiv = document.createElement('div');
      typingDiv.id = id;
      typingDiv.className = 'message assistant';
      typingDiv.innerHTML = `
        <div class="message-content">
          <div class="avatar assistant">AI</div>
          <div class="message-body">
            <div class="typing-indicator">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>
      `;
      chatContainer.appendChild(typingDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return id;
    }

    function updateTypingIndicator(id, text) {
      const typingDiv = document.getElementById(id);
      if (typingDiv) {
        const body = typingDiv.querySelector('.message-body');
        body.innerHTML = marked.parse(text) + `
          <div class="message-actions">
            <button class="action-btn" onclick="copyMessage(this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              Copy
            </button>
          </div>
        `;
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }
    }

    function removeTypingIndicator(id) {
      const typingDiv = document.getElementById(id);
      if (typingDiv) typingDiv.remove();
    }

    function showSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'system-message';
      div.textContent = text;
      chatContainer.appendChild(div);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function startNewChat() {
      currentChatId = Date.now().toString();
      messages = [];
      chatContainer.innerHTML = '';

      const chat = {
        id: currentChatId,
        title: 'New chat',
        messages: [],
        created: Date.now()
      };

      chats.unshift(chat);
      saveChats();
      renderChatHistory();

      if (model) {
        emptyState.style.display = 'none';
        inputContainer.style.display = 'block';
        input.focus();
      }
    }

    function loadCurrentChat() {
      if (chats.length > 0 && !currentChatId) {
        currentChatId = chats[0].id;
        messages = chats[0].messages || [];
        renderMessages();
      }
    }

    function renderMessages() {
      chatContainer.innerHTML = '';
      if (messages.length === 0) return;

      emptyState.style.display = 'none';
      inputContainer.style.display = 'block';

      messages.forEach(msg => {
        addMessage(msg.content, msg.role);
      });
    }

    function saveCurrentChat() {
      const chat = chats.find(c => c.id === currentChatId);
      if (chat) {
        chat.messages = messages;
        chat.title = messages[0]?.content.slice(0, 30) + '...' || 'New chat';
        saveChats();
        renderChatHistory();
      }
    }

    function saveChats() {
      localStorage.setItem('gemma-chats', JSON.stringify(chats.slice(0, 20)));
    }

    function renderChatHistory() {
      chatHistory.innerHTML = '';
      chats.forEach(chat => {
        const div = document.createElement('div');
        div.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
        div.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          ${escapeHtml(chat.title || 'New chat')}
        `;
        div.addEventListener('click', () => loadChat(chat.id));
        chatHistory.appendChild(div);
      });
    }

    function loadChat(id) {
      currentChatId = id;
      const chat = chats.find(c => c.id === id);
      if (chat) {
        messages = chat.messages || [];
        renderMessages();
        renderChatHistory();
      }
      if (window.innerWidth < 768) {
        toggleSidebar();
      }
    }

    function toggleSidebar() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
    }

    window.copyMessage = function(btn) {
      const messageBody = btn.closest('.message-body');
      const text = messageBody.childNodes[0].textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Copied!
        `;
        setTimeout(() => {
          btn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            Copy
          `;
        }, 2000);
      });
    };
  </script>
</body>
</html>
